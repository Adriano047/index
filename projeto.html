<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Desafio Menu</title>
    <link href="https://fonts.googleapis.com/css?family=Oswald" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        body {
            background-color: gray;
        }
       header{
           background-color: black;
           border-bottom: white;
        }
       
        .logo{
            display: inline-block;
            background-color: black;
            padding: 10px;
        }
        .menu-toggle {
            color: white;
            border-radius: 5px;
            background-color: rgb(45, 40, 40);
            float:right;
            height: 40px;
            padding: 10px 20px;
            margin: 20px 15px;
            border: solid 1px rgb(56, 50, 50); 
        }
        .navegacao {
            display: inline-block;
            text-align: center;
        }
        .menu{
            display: inline-block;
            background-color: black;
            padding: 71px 10px 10px 10px ;
        }
        li {
            display: inline-block;
            position: relative;
        }
        li > a{
            display: inline;
            color: white;
            padding: 10px;
            margin-top: 0%;
            text-decoration: none;
            font-size: 25px;
        }
     
        li> a:hover,
        li > a.selected {
            background-color: blue;
            color: black;
        }
    
        .autenticacao {
            float: right;
            background-color: black;
            padding: 71px 10px 10px 10px;
            font-size: 25px;
        }
        .autenticacao > .Login{
            display: inline;
            color: white;
            padding: 10px ;
            text-decoration: none;
        }
       
     
        .Login:hover {
            background-color: blue;
            color: black;
        }
        .botao{
            color: white;
            background: red;
            border-radius: 7px;
            padding: 10px;
            text-decoration: none;
            box-shadow: 2px 2px 1px 1px black;
        }
        .destaque:active{
            box-shadow: none;
        }
        @media(min-width:679px){
            .menu-toggle {
                    display: none;
            }
        }

        
    </style>
</head>

<body>
    <header class="cabecalho">
        <div class="logo">
            <a href="#inicio">
                <img src="http://files.cod3r.com.br/curso-web/logo.png" alt="Logo" 
                   width="250" height="75"/>
            </a>
        </div>
        <button class="menu-toggle">
            <i class="fa fa-lg fa-bars"></i>
        </button>
         <nav class="menu"> 
             <ul>
                
                <li>
                    <a class="inicio" href="#inicio">Início</a>
                </li>
                <li>
                    <a  class="curso" href="#cursos">Cursos</a>
                </li>
                <li>
                  <a  class="sobre" href="#sobre">Sobre</a>        
                </li>
                <li>
                    <a  class="contato" href="#contato">Contato</a>
                </li>
            
            </ul>
        </nav> 
        <aside class="autenticacao">
          
            <a href="#login" class="Login">Login</a>
            <a href="#registar" class="botao destaque">Registrar</a>
      
        </aside>
    </header>

    <script>
    window.onhashchange = function(e) {
        const oldURL = e.oldURL.split('#')[1]
        const newURL = e.newURL.split('#')[1]
        console.log(oldURL,newURL)
        const oldMENU = document.querySelector(`.menu a[href='#${oldURL}']`)
        const newMENU = document.querySelector(`.menu a[href='#${newURL}']`)
        oldMENU && oldMENU.classList.remove('selected')
        newMENU && newMENU.classList.add('selected')

    }
    </script>
</body>

</html>
